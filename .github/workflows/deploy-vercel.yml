# Деплой на Vercel при push в main.
# В настройках репозитория добавь секрет: VERCEL_TOKEN (https://vercel.com/account/tokens)
# После подключения репо к проекту в Vercel можно вместо этого использовать Deploy Hook.

name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BOT_BACKEND_URL: "http://217.114.11.97:8080"

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: team_qR1Va0kQceCraMDJKYvewJVu
          VERCEL_PROJECT_ID: prj_PrCetGsazLNNHuYIO1Rq4bbaLMg8
